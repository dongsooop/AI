name: RAG Light Check

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled]
  workflow_dispatch:

jobs:
  rag-light-check:
    if: >
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.pull_request.labels.*.name, 'run-rag-check')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install lightweight regression dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install numpy pandas pyarrow python-dotenv

      - name: Validate RAG eval question set
        run: python tests/regression/chatbot/evaluate_rag_retrieval.py --validate-only

      - name: Compile RAG regression scripts
        run: |
          python -m py_compile \
            tests/regression/chatbot/evaluate_rag_retrieval.py \
            tests/regression/chatbot/check_chatbot_tool_routing.py \
            tests/regression/chatbot/check_query_index_compat.py \
            tests/regression/chatbot/check_query_index_metadata_quality.py \
            LLM/OSS/tools.py \
            LLM/OSS/service.py \
            LLM/sub_model/query_index.py

      - name: Run lightweight query-index compatibility checks
        run: |
          python tests/regression/chatbot/check_chatbot_tool_routing.py
          python tests/regression/chatbot/check_query_index_compat.py
          python tests/regression/chatbot/check_query_index_metadata_quality.py

      - name: Write summary
        if: always()
        run: |
          {
            echo "## RAG Light Check"
            echo ""
            echo "- Triggered by: \`${{ github.event_name }}\`"
            echo "- PR label required: \`run-rag-check\`"
            echo "- Checks: question-set schema validation, Python compile, lightweight chatbot routing/query-index regressions"
            echo ""
            echo "This workflow does not run the full local model-backed 30-case RAG evaluation."
          } >> "$GITHUB_STEP_SUMMARY"
