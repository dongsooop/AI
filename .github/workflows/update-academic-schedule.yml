name: Update Academic Schedule

on:
  schedule:
    # 3/1 09:30 KST == 3/1 00:30 UTC
    - cron: "30 0 1 3 *"
  workflow_dispatch:
    inputs:
      target_year:
        description: "Academic year to refresh"
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  update-academic-schedule:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pandas selenium

      - name: Show Chrome version
        run: |
          google-chrome --version || chromium-browser --version || true

      - name: Update academic schedule CSV
        run: |
          if [ -n "${{ inputs.target_year }}" ]; then
            python scripts/update_academic_schedule.py --target-year "${{ inputs.target_year }}"
          else
            python scripts/update_academic_schedule.py
          fi

      - name: Validate generated CSV
        env:
          SCHEDULE_CSV_PATH: data/schedule/학사일정_년도추가.csv
        run: |
          test -s data/schedule/학사일정_년도추가.csv
          python -m py_compile scripts/update_academic_schedule.py LLM/sub_model/schedule_index.py

      - name: Create pull request
        uses: peter-evans/create-pull-request@v6
        with:
          branch: chore/update-academic-schedule
          delete-branch: true
          title: "chore: update academic schedule"
          commit-message: "chore: update academic schedule"
          body: |
            ## 관련 이슈

            Closes #이슈번호

            ## 🎯 배경

            - 3월 1일 기준 신규 학년도 학사일정을 자동으로 반영하기 위한 PR입니다.
            - `crawling/` 폴더는 공개하지 않고, GitHub Actions 전용 스크립트만 사용합니다.

            ## 🔍 주요 내용

            - 동양미래대학교 학사일정 페이지에서 대상 학년도 일정을 수집했습니다.
            - 챗봇이 사용하는 `data/schedule/학사일정_년도추가.csv`를 갱신했습니다.
            - CSV 생성 여부와 관련 Python 파일 컴파일을 확인했습니다.
